<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Radio Control</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 15px 25px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: purple;
      color: white;
    }

    button:hover {
      background: #b400ff;
    }
  </style>
</head>
<body>

  <h1>🎵 Panel Radia</h1>

  <p>Wyślij piosenkę na VPS:</p>

  <button onclick="send('1.mp3')">1</button>
  <button onclick="send('2.mp3')">2</button>
  <button onclick="send('3.mp3')">3</button>

  <hr>

  <button onclick="clearQueue()">🧹 Wyczyść kolejkę</button>

  <script>
    const API = "http://92.5.53.139:3000";

    function send(song) {
      fetch(API + "/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ song })
      }).then(() => {
        alert("Dodano: " + song);
      });
    }

    function clearQueue() {
      fetch(API + "/clear", { method: "POST" });
      alert("Wyczyszczono kolejkę");
    }
  </script>

</body>
</html>
