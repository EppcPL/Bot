<!DOCTYPE html>
<html>
<body>
  <h2>Wyślij piosenkę</h2>

  <button onclick="send(1)">1</button>
  <button onclick="send(2)">2</button>
  <button onclick="send(3)">3</button>

  <script>
    function send(num) {
      fetch('http://92.5.53.139:3000/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ song: num + '.mp3' })
      });
    }
  </script>
</body>
</html>
