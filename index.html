<!DOCTYPE html>
<html>
<head>
  <title>Music Panel</title>
</head>
<body>

<h1>🎵 PANEL</h1>

<p id="song">Loading...</p>

<button onclick="skip()">⏭ SKIP</button>

<script>
const VPS = "http://92.5.53.139:3000";

async function load() {
  const res = await fetch(VPS + "/state");
  const data = await res.json();
  document.getElementById("song").innerText = data.currentSong || "none";
}

async function skip() {
  await fetch(VPS + "/skip", { method: "POST" });
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
