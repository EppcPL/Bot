<h1>🎵 PANEL</h1>

<h2 id="song">loading...</h2>

<button onclick="skip()">⏭ SKIP</button>

<script>
const VPS = "http://92.5.53.139:3000";

async function load() {
  const r = await fetch(VPS + "/state");
  const d = await r.json();
  document.getElementById("song").innerText = d.song;
}

async function skip() {
  await fetch(VPS + "/skip", { method: "POST" });
}

setInterval(load, 2000);
load();
</script>
